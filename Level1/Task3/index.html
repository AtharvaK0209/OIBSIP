<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-temperature-half"></i>Temperature Converter</h1>
        <p>Convert temperature instantly between Celsius, Fahrenheit and Klevin</p>
    </header>

    <main>
        <div class="converter-card">
            <div class="input-group">
                <label for="temperature">Enter Temperature</label>
                <input type="number" id="temperature" placeholder="Enter temperature">
            </div>
            <div class="dropdown-row">
                <div class="select-group">
                    <label for="fromUnit">From:</label>
                    <select id="fromUnit">
                        <option value="celsius">Celsius</option>
                        <option value="fahrenheit">Fahrenheit</option>
                        <option value="kelvin">Kelvin</option>
                    </select>
                </div>

                <div class="select-group">
                    <label for="toUnit">To:</label>
                    <select id="toUnit">
                        <option value="celsius">Celsius</option>
                        <option value="fahrenheit">Fahrenheit</option>
                        <option value="kelvin">Kelvin</option>
                    </select>
                </div>
            </div>
            <button id="convert-btn">
                <i class="fa-solid fa-rotate"></i>
                Convert
            </button>
            <div class="result-box">
                <h3>
                    <i class="fa-solid fa-chart-simple"></i>
                    Result
                </h3>
                <p id="result">
                    --
                </p>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Atharva Khandagale | Designed using HTML, CSS and JS</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
