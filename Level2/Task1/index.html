<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>
            <i class="fa-solid fa-calculator"></i>
            Calculator
        </h1>
        <p>
            Perform basic mathematical calculations instantly
        </p>
    </header>

    <main>
        <div class="calculator">
            <div class="display">
                <input
                    type="text"
                    id="display"
                    readonly
                    placeholder="0">
            </div>
            <div class="buttons">
                <button class="operator" onclick="clearDisplay()">AC</button>
                <button class="operator" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendValue('%')">%</button>

                <button class="operator" onclick="appendValue('/')">÷</button>
                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>

                <button class="operator" onclick="appendValue('*')">×</button>
                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>

                <button class="operator" onclick="appendValue('-')">−</button>
                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button class="operator" onclick="appendValue('+')">+</button>
                <button class="zero" onclick="appendValue('0')">
                    0
                </button>
                <button onclick="appendValue('.')">.</button>
                <button class="equal" onclick="calculate()">
                    =
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Atharva Khandagale | Calculator</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
